<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Internship Portfolio App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --cyan: #38bdf8; --purple: #a855f7; --deep: #0f172a; --card-bg: rgba(30,41,59,0.55); }
    body { font-family: 'DM Sans', sans-serif; background-color: #000; display: flex; justify-content: center; margin: 0; padding: 0; }
    h1,h2,h3 { font-family: 'Fraunces', serif; }
    
    /* Web App Shell */
    #app-container {
      width: 100%;
      min-height: 100vh;
      background-color: var(--deep);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .grid-bg { position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);background-size:60px 60px;animation:gridScroll 20s linear infinite;pointer-events:none;z-index:0; }
    @keyframes gridScroll { 0%{transform:translate(0,0)}100%{transform:translate(60px,60px)} }
    .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbFloat 8s ease-in-out infinite alternate}
    .orb-1{width:300px;height:300px;background:radial-gradient(circle,rgba(56,189,248,0.15),transparent 70%);top:-50px;left:-50px;animation-duration:10s}
    .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,0.12),transparent 70%);bottom:-100px;right:-100px;animation-duration:12s;animation-delay:-4s}
    .orb-3{width:200px;height:200px;background:radial-gradient(circle,rgba(14,165,233,0.1),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:14s;animation-delay:-7s}
    @keyframes orbFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-15px) scale(1.05)}100%{transform:translate(-15px,20px) scale(0.95)}}
    
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 100px; /* space for bottom nav */
      z-index: 10;
    }
    
    .scroll-area::-webkit-scrollbar { display: none; }
    .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }

    .glass-card{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid rgba(56,189,248,0.12);border-radius:1.25rem;overflow:hidden;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative}
    .glass-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,0.05),transparent 50%,rgba(168,85,247,0.05));opacity:0;transition:opacity 0.4s ease;pointer-events:none}
    .glass-card:active::before{opacity:1}
    .glass-card:active{transform:scale(0.98);border-color:rgba(56,189,248,0.4)}
    .card-enter{animation:cardSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
    @keyframes cardSlideIn{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    
    .glow-fab {
      position:relative;overflow:hidden;box-shadow:0 10px 25px rgba(56,189,248,0.4),0 0 40px rgba(168,85,247,0.2);transition:all 0.3s ease;
      background: linear-gradient(135deg, #38bdf8, #a855f7);
    }
    .glow-fab:active { transform:scale(0.9) translateY(-10px); box-shadow:0 5px 15px rgba(56,189,248,0.4); }

    .modal-overlay{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px); position:absolute; inset:0; z-index:100; display:none; align-items:center; justify-content:center; padding: 1rem;}
    .modal-overlay.show { display:flex; }
    .modal-box{background:linear-gradient(165deg,rgba(15,23,42,0.97),rgba(30,20,60,0.95));border:1px solid rgba(56,189,248,0.25);backdrop-filter:blur(20px);border-radius:1.5rem;box-shadow:0 25px 80px rgba(0,0,0,0.5),0 0 40px rgba(56,189,248,0.08);animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1); width:100%; max-height:85dvh; overflow-y:auto; padding:1.5rem;}
    @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    
    .form-input{background:rgba(15,23,42,0.8);border:1px solid rgba(56,189,248,0.2);border-radius:0.75rem;padding:0.875rem 1rem;color:#f1f5f9;width:100%;transition:border-color 0.3s ease,box-shadow 0.3s ease;outline:none; font-size:16px;}
    .form-input::placeholder{color:#475569}
    .form-input:focus{border-color:rgba(56,189,248,0.6);box-shadow:0 0 0 3px rgba(56,189,248,0.1)}
    
    .empty-state{text-align:center;padding:5rem 2rem;animation:pulse-soft 3s ease-in-out infinite;}
    @keyframes pulse-soft{0%,100%{opacity:0.7}50%{opacity:1}}
    .title-glow{text-shadow:0 0 40px rgba(56,189,248,0.4)}
    
    .tech-icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;font-weight:700;}
    
    .tech-dropdown{position:relative}
    .tech-dropdown-menu{position:absolute;bottom:100%;left:0;right:0;max-height:180px;overflow-y:auto;background:rgba(15,23,42,0.98);border:1px solid rgba(56,189,248,0.3);border-radius:0.75rem;margin-bottom:4px;z-index:10;display:none; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);}
    .tech-dropdown-menu.open{display:block}
    .tech-option{padding:0.75rem 1rem;cursor:pointer;display:flex;align-items:center;gap:0.75rem;color:#cbd5e1;font-size:0.95rem;}
    .tech-option:active{background:rgba(56,189,248,0.15)}
    .tech-option.selected{background:rgba(56,189,248,0.2);color:#38bdf8}
    
    .selected-techs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .selected-tech-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9999px;background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.3);color:#38bdf8;font-size:0.8rem;}

    /* Delete Mode */
    .delete-btn { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .delete-mode-active .delete-btn { opacity: 1; pointer-events: auto; }
    .delete-mode-active .glass-card { border-color: rgba(239, 68, 68, 0.4); animation: shake 0.5s infinite alternate; }
    @keyframes shake { from { transform: rotate(-0.5deg); } to { transform: rotate(0.5deg); } }
  </style>
 </head>
 <body>
  <div id="app-container">
      <div class="grid-bg"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      
      <!-- Top Header -->
      <header class="w-full pt-10 pb-4 px-6 relative z-10 flex justify-between items-center bg-gradient-to-b from-slate-900 to-transparent">
       <div>
        <h1 class="canva-text title-glow text-2xl font-bold text-white tracking-wide">Projects</h1>
        <p class="canva-text mt-1 text-xs text-cyan-400 uppercase tracking-widest font-medium">Internship</p>
       </div>
      </header>

      <!-- Scrollable Content -->
      <main class="scroll-area px-8 md:px-12 pt-6">
       <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
       <div id="empty-state" class="empty-state mt-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-800/50 border border-cyan-500/20 mb-6 shadow-inner">
         <i data-lucide="folder-open" style="width:36px;height:36px;color:#38bdf8"></i>
        </div>
        <p class="text-slate-200 font-medium text-lg">No projects found</p>
        <p class="text-slate-400 mt-2 text-sm">Tap the + button to add your first internship project.</p>
       </div>
      </main>

      <!-- Bottom App Navigation Bar -->
      <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a]/85 backdrop-blur-xl border-t border-cyan-500/20 z-40 flex justify-center items-center gap-6 px-8 py-3 pb-8">
        <button class="glow-fab text-white w-14 h-14 rounded-full flex items-center justify-center transform -translate-y-6 border-2 border-slate-900 bg-gradient-to-br from-red-500 to-orange-500 shadow-[0_10px_25px_rgba(239,68,68,0.4)]" onclick="toggleDeleteMode()">
            <i data-lucide="minus" style="width:28px;height:28px"></i>
        </button>
        <button class="glow-fab text-white w-14 h-14 rounded-full flex items-center justify-center transform -translate-y-6 border-2 border-slate-900" onclick="showPasswordModal()">
            <i data-lucide="plus" style="width:28px;height:28px"></i>
        </button>
      </nav>

      <!-- Password Modal -->
      <div id="password-modal" class="modal-overlay">
       <div class="modal-box">
        <h2 class="text-white text-xl font-bold mb-2">Security Check</h2>
        <p class="text-slate-400 text-sm mb-5">Please authenticate to add new projects.</p>
        <input id="pw-input" type="password" placeholder="Master Password" class="form-input">
        <p id="pw-error" class="text-red-400 text-xs mt-2 hidden">Access denied. Invalid password.</p>
        <div class="flex gap-3 mt-6">
            <button class="flex-1 py-3 rounded-xl font-medium text-sm bg-slate-800 text-slate-300 active:bg-slate-700" onclick="hidePasswordModal()">Cancel</button> 
            <button class="flex-1 py-3 rounded-xl font-medium text-sm bg-cyan-500 text-slate-900 active:bg-cyan-400" onclick="checkPassword()">Unlock</button>
        </div>
       </div>
      </div>

      <!-- Project Form Modal -->
      <div id="project-modal" class="modal-overlay">
       <div class="modal-box">
        <h2 class="text-white text-xl font-bold mb-1">New Project</h2>
        <p class="text-slate-400 text-xs mb-5">Fetch from GitHub or enter manually.</p>
        <form id="project-form" class="space-y-4">
         <div>
          <label class="text-slate-300 block text-xs font-medium mb-1.5 ml-1"><i data-lucide="github" class="inline w-3 h-3 mr-1"></i>GitHub Repository</label>
          <input id="git-input" type="text" placeholder="e.g. facebook/react" class="form-input">
         </div>
         <div>
          <label class="text-slate-300 block text-xs font-medium mb-1.5 ml-1"><i data-lucide="globe" class="inline w-3 h-3 mr-1"></i>Live Demo URL (Optional)</label>
          <input id="url-input" type="url" placeholder="https://" class="form-input">
         </div>
         <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-slate-700"></div>
            <span class="flex-shrink-0 mx-4 text-slate-500 text-xs uppercase tracking-wider font-bold">Manual Fallback</span>
            <div class="flex-grow border-t border-slate-700"></div>
         </div>
         <div>
          <label class="text-slate-300 block text-xs font-medium mb-1.5 ml-1">Project Name</label>
          <input id="manual-name-input" type="text" placeholder="Project name" class="form-input">
         </div>
         <div>
          <label class="text-slate-300 block text-xs font-medium mb-1.5 ml-1">Description</label>
          <input id="manual-desc-input" type="text" placeholder="Short description" class="form-input">
         </div>
         <div>
          <label class="text-slate-300 block text-xs font-medium mb-1.5 ml-1">Tech Stack</label>
          <div class="tech-dropdown">
           <input id="tech-search" type="text" placeholder="Search 100+ technologies..." class="form-input" autocomplete="off">
           <div id="tech-dropdown-menu" class="tech-dropdown-menu"></div>
          </div>
          <div id="selected-techs" class="selected-techs"></div>
         </div>
         <div class="flex gap-3 mt-6 pt-2">
            <button type="button" class="flex-1 py-3 rounded-xl font-medium text-sm bg-slate-800 text-slate-300 active:bg-slate-700" onclick="hideProjectModal()">Cancel</button> 
            <button type="submit" id="form-submit-btn" class="flex-[2] py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-cyan-500 to-purple-500 text-white shadow-lg active:opacity-80">Add Project</button>
         </div>
        </form>
       </div>
      </div>
  </div>

  <script>
    lucide.createIcons();

    let TECHNOLOGIES = [];
    let SAVED_PROJECTS = [];
    let isDeleteMode = false;

    function toggleDeleteMode() {
        isDeleteMode = !isDeleteMode;
        if (isDeleteMode) {
            document.getElementById('project-grid').classList.add('delete-mode-active');
        } else {
            document.getElementById('project-grid').classList.remove('delete-mode-active');
        }
    }

    // Fetch the massive JSON database of programming languages, frameworks, and blockchains
    fetch('technologies.json')
      .then(res => res.json())
      .then(data => {
          TECHNOLOGIES = data;
          
          // Fetch projects from backend API
          fetch('/api/projects')
            .then(res => res.json())
            .then(projectsData => {
                SAVED_PROJECTS = projectsData || [];
                
                // Render any saved projects now that everything is loaded
                if (SAVED_PROJECTS.length > 0) {
                    SAVED_PROJECTS.forEach(p => createProjectCard(p, false));
                } else {
                    document.getElementById('empty-state').style.display = 'block';
                }
            })
            .catch(err => {
                console.error("Error loading projects from server:", err);
            });
      })
      .catch(err => console.error("Error loading technologies database:", err));

    let selectedTechs = [];

    function showPasswordModal() {
      document.getElementById('password-modal').classList.add('show');
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-error').classList.add('hidden');
    }
    function hidePasswordModal() { document.getElementById('password-modal').classList.remove('show'); }
    function checkPassword() {
      if (document.getElementById('pw-input').value === 'ankyl') {
        hidePasswordModal();
        document.getElementById('project-modal').classList.add('show');
        selectedTechs = [];
        renderSelectedTechs();
      } else {
        document.getElementById('pw-error').classList.remove('hidden');
      }
    }
    function hideProjectModal() { document.getElementById('project-modal').classList.remove('show'); }

    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

    // Tech dropdown logic
    const techSearch = document.getElementById('tech-search');
    const techMenu = document.getElementById('tech-dropdown-menu');

    function renderDropdown(filter = '') {
      const filtered = TECHNOLOGIES.filter(t => t.name.toLowerCase().includes(filter.toLowerCase())).slice(0, 20);
      techMenu.innerHTML = filtered.map(t => {
        const sel = selectedTechs.includes(t.name) ? ' selected' : '';
        return `<div class="tech-option${sel}" data-name="${t.name}">
                  <i class="${t.icon}" style="color:${t.color};font-size:1.25rem;width:24px;text-align:center"></i>
                  <span>${t.name}</span>
                </div>`;
      }).join('');
    }

    techSearch.addEventListener('focus', () => { renderDropdown(techSearch.value); techMenu.classList.add('open'); });
    techSearch.addEventListener('input', () => { renderDropdown(techSearch.value); techMenu.classList.add('open'); });
    document.addEventListener('click', e => { if (!e.target.closest('.tech-dropdown')) techMenu.classList.remove('open'); });

    techMenu.addEventListener('click', e => {
      const opt = e.target.closest('.tech-option');
      if (!opt) return;
      const name = opt.dataset.name;
      if (selectedTechs.includes(name)) {
        selectedTechs = selectedTechs.filter(n => n !== name);
      } else {
        selectedTechs.push(name);
      }
      renderDropdown(techSearch.value);
      renderSelectedTechs();
      techSearch.focus(); // Keep focus for easy multiple selections
    });

    function renderSelectedTechs() {
      const container = document.getElementById('selected-techs');
      container.innerHTML = selectedTechs.map(name => {
        const t = TECHNOLOGIES.find(x => x.name === name);
        return `<span class="selected-tech-tag" data-name="${name}">
                  <i class="${t.icon}" style="color:${t.color}"></i> ${name} 
                  <i data-lucide="x" class="w-3 h-3 ml-1"></i>
                </span>`;
      }).join('');
      lucide.createIcons();
    }

    document.getElementById('selected-techs').addEventListener('click', e => {
      const tag = e.target.closest('.selected-tech-tag');
      if (!tag) return;
      selectedTechs = selectedTechs.filter(n => n !== tag.dataset.name);
      renderSelectedTechs();
      renderDropdown(techSearch.value);
    });

    function createProjectCard(projectData, save = true) {
      document.getElementById('empty-state').style.display = 'none';
      
      if (save) {
        // Save to backend API
        fetch('/api/projects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(projectData)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                SAVED_PROJECTS.push(projectData);
            }
        })
        .catch(err => console.error("Error saving to server:", err));
      }
      const card = document.createElement('article');
      card.className = 'glass-card p-5 card-enter flex flex-col mb-4';
      const repoUrl = `https://github.com/${projectData.gitId}`;
      const description = projectData.description || 'No description available';
      const techs = projectData.techs || [];

      const techIcons = techs.map(name => {
        const t = TECHNOLOGIES.find(x => x.name === name);
        if (!t) return '';
        return `<div class="tech-icon" style="background:${t.color}22;color:${t.color};border:1px solid ${t.color}44" title="${t.name}"><i class="${t.icon}"></i></div>`;
      }).join('');

      card.innerHTML = `
        <div class="flex-1 mb-4">
          <div class="flex items-start gap-2 mb-2">
            <i data-lucide="git-branch" class="w-5 h-5 text-cyan-400 mt-0.5 shrink-0"></i>
            <h2 class="text-lg font-bold text-white break-words capitalize leading-tight flex-1">${projectData.name.replace(/-/g, ' ')}</h2>
            <button type="button" class="delete-btn text-slate-500 hover:text-red-400 transition-colors ml-2 shrink-0 p-1" data-name="${projectData.name.replace(/"/g, '&quot;')}">
              <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
            </button>
          </div>
          <p class="text-sm text-slate-300 leading-relaxed">${description}</p>
        </div>
        
        ${techIcons ? `<div class="flex flex-wrap gap-2 mb-5">${techIcons}</div>` : ''}
        
        <div class="flex gap-3 pt-4 border-t border-cyan-500/10 mt-auto">
          ${projectData.gitId ? `
          <a href="${repoUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-slate-800/80 hover:bg-slate-700 text-slate-200 transition-colors text-sm font-medium border border-slate-700">
            <i data-lucide="github" class="w-4 h-4"></i> Code
          </a>` : ''}
          ${projectData.liveUrl ? `
          <a href="${projectData.liveUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 transition-colors text-sm font-medium border border-cyan-500/30">
            <i data-lucide="external-link" class="w-4 h-4"></i> Live
          </a>` : ''}
        </div>`;
      
      document.getElementById('project-grid').appendChild(card);
      lucide.createIcons();
      
      // Scroll to bottom
      const scrollArea = document.querySelector('.scroll-area');
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
    }

    document.getElementById('project-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const gitId = document.getElementById('git-input').value.trim();
      const liveUrl = document.getElementById('url-input').value.trim();
      const manualName = document.getElementById('manual-name-input').value.trim();
      const manualDesc = document.getElementById('manual-desc-input').value.trim();
      
      if (!gitId && !manualName) {
         document.getElementById('git-input').focus();
         return;
      }

      const submitBtn = document.getElementById('form-submit-btn');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 inline animate-spin mr-2"></i> Adding...';
      lucide.createIcons();
      submitBtn.disabled = true;

      try {
        if (gitId) {
            const response = await fetch(`https://api.github.com/repos/${gitId}`);
            if (response.ok) {
              const repoData = await response.json();
              createProjectCard({ gitId, name: repoData.name, description: repoData.description, techs: [...selectedTechs], liveUrl: liveUrl || null });
              closeAndResetForm();
              return;
            }
        }
        
        // Fallback to manual
        if (!manualName) {
          alert("GitHub repo not found. Please enter a manual project name.");
          document.getElementById('manual-name-input').focus();
          return;
        }
        createProjectCard({ gitId: gitId || null, name: manualName, description: manualDesc, techs: [...selectedTechs], liveUrl: liveUrl || null });
        closeAndResetForm();

      } catch (error) {
        if (manualName) {
          createProjectCard({ gitId: gitId || null, name: manualName, description: manualDesc, techs: [...selectedTechs], liveUrl: liveUrl || null });
          closeAndResetForm();
        } else {
          alert("Error fetching repository. Please try manual entry.");
        }
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    function closeAndResetForm() {
        hideProjectModal();
        document.getElementById('project-form').reset();
        selectedTechs = [];
        renderSelectedTechs();
    }

    window.deleteProject = async function(name) {
      if (!confirm(`Are you sure you want to permanently delete "${name}"?`)) return;
      
      try {
          // Send DELETE request to backend
          const res = await fetch(`/api/projects/${encodeURIComponent(name)}`, { method: 'DELETE' });
          const data = await res.json();
          if (data.success) {
              // Remove from array
              SAVED_PROJECTS = SAVED_PROJECTS.filter(p => p.name !== name);
              
              // Re-render grid
              document.getElementById('project-grid').innerHTML = '';
              if (SAVED_PROJECTS.length === 0) {
                  document.getElementById('empty-state').style.display = 'block';
              } else {
                  SAVED_PROJECTS.forEach(p => createProjectCard(p, false));
              }
          }
      } catch (err) {
          console.error("Failed to delete project:", err);
          alert("Failed to delete project. Is the server running?");
      }
    };

    document.getElementById('project-grid').addEventListener('click', e => {
      const btn = e.target.closest('.delete-btn');
      if (btn) {
        e.stopPropagation();
        deleteProject(btn.dataset.name);
      }
    });
  </script>
 </body>
</html>
